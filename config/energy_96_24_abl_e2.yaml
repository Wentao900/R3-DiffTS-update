# Ablation E2: +R+D
# Dataset: energy seq=96 pred=24

train:
  epochs: 150
  batch_size: 64
  lr: 0.001
  itr_per_epoch: 100000000.0
  multi_res_loss_weight: 0.0
  use_scale_router: false
diffusion:
  layers: 6
  channels: 64
  nheads: 8
  diffusion_embedding_dim: 128
  beta_start: 0.0001
  beta_end: 0.7
  num_steps: 500
  schedule: quad
  is_linear: false
  noise_esti: false
  cfg: true
  c_mask_prob: 0.2
  ddim: true
  sample_steps: 100
  sample_method: quad
  pre_norm: false
  trend_cfg: true
  trend_cfg_power: 1.0
  trend_strength_scale: 0.35
  trend_volatility_scale: 1.0
  trend_time_floor: 0.3
  trend_cfg_random: false
model:
  is_unconditional: 0
  timeemb: 128
  featureemb: 16
  target_strategy: test
  num_sample_features: 64
  timestep_branch: true
  timestep_emb_cat: true
  with_texts: true
  relative_size_emb_cat: false
  decomp: false
  llm: bert
  llm_layers: 0
  use_rag_cot: true
  use_two_stage_rag: true
  rag_topk: 3
  rag_stage1_topk: 9
  rag_stage2_topk: 3
  cot_temperature: 0.4
  cot_max_new_tokens: 64
