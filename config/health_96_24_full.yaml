# R3-DiffTS full pipeline config: health seq=96 pred=24
# Includes: RAG+CoT, Two-Stage RAG, Trend-aware CFG, Multi-res Loss, Scale Router

train:
  epochs: 150
  batch_size: 64
  lr: 0.0001
  itr_per_epoch: 100000000.0
  multi_res_band_boundaries:
  - 6
  - 12
  - 24
  multi_res_loss_weight: 0.1
  multi_res_use_huber: true
  multi_res_huber_delta: 1.0
  multi_res_mode: static_band
  use_scale_router: true
  scale_router_hidden_dim: 32
  scale_router_dropout: 0.1
  scale_router_entropy_weight: 0.001
  scale_router_use_trend_prior: true
  scale_router_use_text_mask: true
  scale_router_teacher_weight: 0.1
  scale_router_warmup_steps: 400
diffusion:
  layers: 6
  channels: 64
  nheads: 8
  diffusion_embedding_dim: 128
  beta_start: 0.0001
  beta_end: 0.4
  num_steps: 350
  schedule: quad
  is_linear: false
  noise_esti: false
  cfg: true
  c_mask_prob: 0.05
  ddim: true
  sample_steps: 30
  sample_method: quad
  pre_norm: false
  trend_cfg: true
  trend_cfg_power: 1.0
  trend_strength_scale: 0.35
  trend_volatility_scale: 1.0
  trend_time_floor: 0.3
model:
  is_unconditional: 0
  timeemb: 128
  featureemb: 16
  target_strategy: test
  num_sample_features: 64
  timestep_branch: true
  timestep_emb_cat: true
  with_texts: true
  relative_size_emb_cat: false
  decomp: false
  llm: bert
  llm_layers: 0
  use_rag_cot: true
  use_two_stage_rag: true
  rag_topk: 3
  rag_stage1_topk: 9
  rag_stage2_topk: 3
  cot_temperature: 0.4
  cot_max_new_tokens: 64
