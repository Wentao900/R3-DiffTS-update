# type: args

seq_len: 36
pred_len: 12
text_len: 36

train:
  epochs: 150
  batch_size: 32
  lr: 0.0025
  itr_per_epoch: 1.0e+8
  multi_res_horizons: [1, 3, 6, 12]
  multi_res_band_boundaries: [1, 3, 6, 12]
  multi_res_loss_weight: 0.1
  multi_res_use_huber: true
  multi_res_huber_delta: 1.0
  multi_res_mode: dynamic_band
  multi_res_weight_mode: adaptive
  multi_res_weight_focus: hard
  multi_res_weight_beta: 0.95
  multi_res_weight_temp: 1.0
  multi_res_weight_strength: 0.3
  multi_res_weight_alpha: 0.7
  multi_res_weight_floor: 0.15
  multi_res_weight_warmup_steps: 400
  use_scale_router: true
  scale_router_hidden_dim: 32
  scale_router_dropout: 0.1
  scale_router_temp: 1.0
  scale_router_entropy_weight: 1.0e-3
  scale_router_use_trend_prior: true
  scale_router_use_text_mask: true
  scale_router_teacher_weight: 0.1
  scale_router_warmup_steps: 400

diffusion:
  layers: 6
  channels: 64
  nheads: 8
  diffusion_embedding_dim: 128
  beta_start: 0.0001
  beta_end: 0.6
  num_steps: 300
  schedule: "quad"
  is_linear: false
  noise_esti: false
  cfg: true
  c_mask_prob: 0.05
  ddim: true
  sample_steps: 20
  sample_method: "quad"
  pre_norm: false
  use_router_guide: true
  router_guide_alpha: 0.6
  router_guide_min_ratio: 0.5
  router_guide_max_ratio: 1.5
  router_guide_detach: true

model:
  cot_model: ./gpt2-medium
  cot_temperature: 0.4
  cot_max_new_tokens: 64
  dynamic_text_len: true
  dynamic_text_lens: [6, 18, 36]
  is_unconditional: 0
  timeemb: 128
  featureemb: 16
  guide_w_default: 0.8
  guide_w_candidates: [0.4, 0.5, 0.6, 0.7, 0.8, 0.9, 1.0, 1.2, 1.4]
  target_strategy: "test"
  num_sample_features: 64
  rag_stage1_topk: 9
  rag_stage2_topk: 3
  rag_topk: 3
  timestep_branch: false
  timestep_emb_cat: true
  with_texts: true
  relative_size_emb_cat: false
  decomp: false
  llm: "bert"
  llm_layers: 0
  scale_aware_rag: true
  use_rag_cot: true
  use_two_stage_rag: true
