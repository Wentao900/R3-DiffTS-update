#type: args

train:
  epochs: 150
  batch_size: 64
  lr: 7.5e-05
  itr_per_epoch: 1.0e+8
  multi_res_horizons: [1, 3, 6, 12]
  multi_res_loss_weight: 0.03
  multi_res_use_huber: true
  multi_res_huber_delta: 1.0
  multi_res_dynamic: true
  multi_res_dynamic_by_t: true
  multi_res_dynamic_by_epoch: true
  multi_res_dynamic_by_trend: false
  multi_res_dynamic_min_weight: 0.3
  event_loss_weight: 0.02
  event_jump_scale: 2.0
  event_turning_weight: 1.0

diffusion:
  layers: 4
  channels: 64
  nheads: 8
  diffusion_embedding_dim: 128
  beta_start: 0.0001
  beta_end: 0.4
  num_steps: 475
  schedule: "quad"
  is_linear: False
  noise_esti: False
  cfg: True
  c_mask_prob: 0.05
  ddim: True
  sample_steps: 60
  sample_method: "quad"
  pre_norm: False

model:
  cot_model: ./gpt2-medium
  cot_temperature: 0.4
  cot_max_new_tokens: 64
  is_unconditional: 0
  timeemb: 128
  featureemb: 16
  guide_w_default: 4.0
  target_strategy: "test"
  num_sample_features: 64
  rag_stage1_topk: 9
  rag_stage2_topk: 3
  rag_topk: 3
  timestep_branch: False
  timestep_emb_cat: True
  with_texts: True
  relative_size_emb_cat: False
  decomp: False
  llm: "bert"
  llm_layers: 0
  use_rag_cot: true
  use_two_stage_rag: true
